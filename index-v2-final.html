<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 美加墨世界杯 — 实时战报</title>
<style>
:root {
  --bg: #f0f2f5; --card: #ffffff; --green: #1a7a3c;
  --gold: #c9a227; --red: #e03e3e; --text: #1a1a2e;
  --text-light: #888; --border: #e0e0e0; --shadow: rgba(0,0,0,.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

/* Header */
.header { background: linear-gradient(135deg, var(--green) 0%, #0d5a2b 100%); color: #fff; padding: 20px 24px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
.header-sub { font-size: 12px; opacity: .75; margin-top: 2px; }
.header-right { float: right; font-size: 12px; opacity: .7; text-align: right; margin-top: -32px; }

/* Tabs */
.tabs { display: flex; gap: 0; background: var(--green); padding: 0 24px; border-top: 1px solid rgba(255,255,255,.15); }
.tab-btn { padding: 10px 18px; background: none; border: none; color: rgba(255,255,255,.7); cursor: pointer; font-size: 14px; font-weight: 500; transition: .2s; border-bottom: 2px solid transparent; }
.tab-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
.tab-btn.active { color: #fff; border-bottom-color: #ffd700; }

/* Content */
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.view-section { display: none; animation: fadeIn .3s ease; }
.view-section.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* Stats bar */
.stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--card); border-radius: 10px; padding: 14px 16px; box-shadow: 0 2px 8px var(--shadow); text-align: center; }
.stat-num { font-size: 26px; font-weight: 800; color: var(--green); }
.stat-label { font-size: 11px; color: var(--text-light); margin-top: 2px; }

/* ===== TODAY VIEW ===== */
.today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.today-block { background: var(--card); border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px var(--shadow); }
.today-block h3 { font-size: 15px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.recent-list { max-height: 300px; overflow-y: auto; }
.recent-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.recent-table th { background: #f8f9fa; padding: 6px 8px; font-weight: 600; font-size: 11px; color: var(--text-light); text-align: left; border-bottom: 1px solid var(--border); }
.recent-table th.ta-r { text-align: right; }
.recent-table td { padding: 6px 8px; border-bottom: 1px solid #f9f9f9; vertical-align: middle; }
.recent-table tr:last-child td { border-bottom: none; }
.recent-table tr:hover { background: #fafff5; }
.recent-team { font-weight: 500; cursor: pointer; color: var(--green); }
.recent-team:hover { text-decoration: underline; }
.recent-score { font-weight: 700; font-size: 13px; text-align: center; }
.recent-info { font-size: 11px; color: var(--text-light); white-space: nowrap; }
.upcoming-time { font-size: 12px; color: var(--gold); font-weight: 600; white-space: nowrap; }
.upcoming-vs { color: var(--text-light); }
.upcoming-venue { font-size: 11px; color: var(--text-light); white-space: nowrap; }

/* ===== STANDINGS VIEW ===== */
.groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.group-card { background: var(--card); border-radius: 10px; box-shadow: 0 2px 8px var(--shadow); overflow: hidden; }
.group-header { background: var(--green); color: #fff; padding: 10px 14px; font-weight: 700; font-size: 15px; }
.group-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.group-table th { background: #f8f9fa; padding: 6px 8px; font-weight: 600; font-size: 11px; color: var(--text-light); text-align: left; border-bottom: 1px solid var(--border); }
.group-table td { padding: 6px 8px; border-bottom: 1px solid #f9f9f9; vertical-align: middle; }
.group-table tr:last-child td { border-bottom: none; }
.group-table tr:hover { background: #fafff5; }
.pos-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700; color: #fff; }
.pos-1 { background: var(--gold); } .pos-2 { background: #b0b0b0; }
.pos-3 { background: #cd7f32; } .pos-other { background: #ddd; color: #555; }
.team-name-cell { font-weight: 500; cursor: pointer; color: var(--green); }
.team-name-cell:hover { text-decoration: underline; }
.advanced-check { color: var(--green); font-size: 14px; }
.pts-bold { font-weight: 700; font-size: 14px; color: var(--green); }

/* ===== MATCHES + TIMELINE ===== */
.timeline-wrap { background: var(--card); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; box-shadow: 0 2px 8px var(--shadow); overflow-x: auto; }
.timeline-inner { display: flex; gap: 6px; min-width: max-content; }
.tl-day { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; background: #f0f0f0; color: var(--text-light); transition: .2s; user-select: none; }
.tl-day:hover { background: #e0e0e0; color: var(--text); }
.tl-day.active { background: var(--green); color: #fff; }
.tl-day.has-played { border-left: 3px solid var(--green); }
.tl-day.has-upcoming { border-left: 3px solid var(--gold); }
.tl-count { font-size: 10px; opacity: .7; margin-left: 3px; }

.match-card { background: var(--card); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px var(--shadow); display: flex; align-items: center; gap: 16px; transition: transform .15s; }
.match-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
.match-card.played { border-left: 4px solid var(--green); }
.match-card.upcoming { border-left: 4px solid var(--gold); }
.match-teams { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.match-team { font-weight: 600; font-size: 14px; cursor: pointer; color: var(--green); white-space: nowrap; }
.match-team:hover { text-decoration: underline; }
.match-score { font-weight: 800; font-size: 17px; min-width: 48px; text-align: center; }
.played-score { color: var(--green); }
.match-detail { text-align: right; white-space: nowrap; }
.md-time { font-size: 12px; color: var(--gold); font-weight: 600; }
.md-venue { font-size: 11px; color: var(--text-light); }

/* ===== BRACKET — Compact Grid Layout ===== */
.bracket-container { background: var(--card); border-radius: 10px; padding: 16px 12px; box-shadow: 0 2px 8px var(--shadow); overflow: visible; }
.bracket-title { text-align: center; font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--green); }

.bracket-wrapper { display: flex; gap: 0; align-items: stretch; }
.bracket-half { flex: 1 1 0; display: flex; flex-direction: column; min-width: 0; }
.bracket-half-label { text-align: center; font-size: 12px; font-weight: 700; background: #e8f5e9; color: var(--green); padding: 4px 0; border-radius: 16px; margin-bottom: 10px; flex-shrink: 0; }
.bracket-half-columns { display: flex; gap: 0; flex: 1; align-items: stretch; }

/* Round column */
.bracket-round-col { flex: 1 1 0; display: flex; flex-direction: column; min-width: 0; padding: 0 2px; }
.bracket-round-header { text-align: center; font-size: 10px; font-weight: 700; color: var(--green); padding: 3px 2px; margin-bottom: 6px; background: #f0faf0; border-radius: 4px; flex-shrink: 0; }
.bracket-round-matches { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 0; min-height: 0; }

/* Connector */
.bracket-connector-col { width: 22px; flex-shrink: 0; position: relative; }
.bracket-connector-col::before { content: ''; position: absolute; left: 50%; top: 4%; bottom: 4%; width: 1.5px; background: #d0d0d0; transform: translateX(-50%); }

/* Match card (side halves) */
.match-slot { padding: 1px 0; }
.match-mini-card { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 4px 5px; transition: all .15s; }
.match-mini-card:hover { border-color: var(--green); box-shadow: 0 2px 8px rgba(0,0,0,.1); z-index: 2; }
.match-mini-card .mm-teams { display: flex; flex-direction: column; gap: 0; margin-bottom: 2px; }
.match-mini-card .mm-team-row { display: flex; align-items: center; gap: 2px; font-size: 9px; line-height: 1.35; }
.match-mini-card .mm-num { display: inline-block; background: #e8f5e9; color: var(--green); border-radius: 2px; font-size: 7px; padding: 0 2px; font-weight: 600; flex-shrink: 0; width: 14px; text-align: center; }
.match-mini-card .mm-num.empty { background: transparent; }
.match-mini-card .mm-team-name { font-weight: 600; cursor: pointer; color: var(--green); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.match-mini-card .mm-team-name:hover { text-decoration: underline; }
.match-mini-card .mm-team-name.winner { color: var(--gold); font-weight: 700; }
.match-mini-card .mm-score { font-weight: 700; font-size: 10px; min-width: 16px; text-align: center; color: var(--text); flex-shrink: 0; }
.match-mini-card .mm-score.played { color: var(--green); }
.match-mini-card .mm-score.dash { color: var(--text-light); }
.match-mini-card .mm-time { font-size: 8px; color: var(--gold); font-weight: 600; white-space: nowrap; }
.match-mini-card .mm-venue { font-size: 7px; color: var(--text-light); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* --- CENTER: Final & Third Place --- */
.bracket-center { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 260px; flex-shrink: 0; padding: 0 14px; gap: 14px; }

/* Final — BIG & GOLD */
.bracket-final-card { background: linear-gradient(135deg, #fffef5 0%, #fff8d6 50%, #ffeaa7 100%); border: 3px solid var(--gold); border-radius: 14px; padding: 16px 20px; width: 100%; box-shadow: 0 4px 20px rgba(201,162,39,.25); position: relative; }
.bracket-final-card .bracket-final-label { text-align: center; font-size: 15px; font-weight: 800; color: var(--gold); margin-bottom: 10px; letter-spacing: 2px; }
.bracket-final-card .bracket-final-label::before { content: '🏆 '; font-size: 18px; }
.bracket-final-card .bracket-final-label::after { content: ' 🏆'; font-size: 18px; }
.bracket-final-card .mm-teams { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
.bracket-final-card .mm-team-row { display: flex; align-items: center; gap: 8px; font-size: 15px; line-height: 1.5; padding: 3px 0; }
.bracket-final-card .mm-num { display: inline-block; background: #fff3cd; color: var(--gold); border-radius: 3px; font-size: 11px; padding: 1px 5px; font-weight: 700; flex-shrink: 0; }
.bracket-final-card .mm-num.empty { background: transparent; }
.bracket-final-card .mm-team-name { font-weight: 700; font-size: 15px; cursor: pointer; color: var(--green); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bracket-final-card .mm-team-name:hover { text-decoration: underline; }
.bracket-final-card .mm-team-name.winner { color: #b8860b; font-weight: 800; font-size: 16px; }
.bracket-final-card .mm-score { font-weight: 800; font-size: 18px; min-width: 28px; text-align: center; flex-shrink: 0; }
.bracket-final-card .mm-score.played { color: var(--green); }
.bracket-final-card .mm-score.dash { color: var(--text-light); }
.bracket-final-card .mm-time { font-size: 12px; color: #8b7300; font-weight: 700; text-align: center; margin-top: 2px; }
.bracket-final-card .mm-venue { font-size: 11px; color: var(--text-light); text-align: center; margin-top: 4px; }
.bracket-final-card .bracket-trophy-icon { text-align: center; font-size: 36px; margin-bottom: 4px; line-height: 1; }

/* Third place */
.bracket-third-card { background: #f5f5f5; border: 1px solid #d0d0d0; border-radius: 10px; padding: 10px 16px; width: 100%; }
.bracket-third-card .bracket-third-label { text-align: center; font-size: 12px; font-weight: 700; color: #999; margin-bottom: 6px; }
.bracket-third-card .mm-teams { display: flex; flex-direction: column; gap: 2px; margin-bottom: 5px; }
.bracket-third-card .mm-team-row { display: flex; align-items: center; gap: 4px; font-size: 11px; line-height: 1.4; }
.bracket-third-card .mm-num { display: inline-block; background: #e0e0e0; color: #666; border-radius: 2px; font-size: 8px; padding: 0 3px; font-weight: 600; flex-shrink: 0; }
.bracket-third-card .mm-num.empty { background: transparent; }
.bracket-third-card .mm-team-name { font-weight: 600; cursor: pointer; color: var(--green); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bracket-third-card .mm-team-name:hover { text-decoration: underline; }
.bracket-third-card .mm-score { font-weight: 700; font-size: 12px; min-width: 22px; text-align: center; flex-shrink: 0; }
.bracket-third-card .mm-score.played { color: var(--green); }
.bracket-third-card .mm-score.dash { color: var(--text-light); }
.bracket-third-card .mm-time { font-size: 10px; color: #666; font-weight: 600; text-align: center; }
.bracket-third-card .mm-venue { font-size: 9px; color: var(--text-light); text-align: center; margin-top: 2px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; justify-content: center; align-items: flex-start; padding-top: 60px; overflow-y: auto; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--card); border-radius: 14px; width: 95%; max-width: 600px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: modalIn .25s ease; margin-bottom: 40px; }
@keyframes modalIn { from{opacity:0;transform:scale(.95)translateY(-10px)} to{opacity:1;transform:none} }
.modal-head { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-head h2 { font-size: 17px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-light); line-height: 1; padding: 0 4px; }
.modal-close:hover { color: var(--red); }
.modal-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 14px 20px; background: #f8f9fa; border-bottom: 1px solid var(--border); }
.ms-item { text-align: center; }
.ms-item.ms-group-rank { grid-column: 1 / -1; text-align: center; }
.ms-item.ms-group-rank .ms-val { font-size: 14px; font-weight: 700; color: var(--gold); }
.ms-val { font-size: 20px; font-weight: 800; color: var(--green); }
.ms-lbl { font-size: 10px; color: var(--text-light); }
.modal-body { padding: 14px 20px; }
.mtr-record { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
.mtr-date { min-width: 85px; font-weight: 600; color: var(--text); font-size: 12px; }
.mtr-stage { min-width: 50px; font-size: 11px; color: var(--text-light); background: #f0f0f0; padding: 2px 6px; border-radius: 4px; text-align: center; }
.mtr-ha { min-width: 22px; font-size: 11px; color: var(--text-light); text-align: center; }
.mtr-opponent { font-weight: 500; cursor: pointer; color: var(--green); flex: 1; }
.mtr-opponent:hover { text-decoration: underline; }
.mtr-score-w { color: var(--green); font-weight: 700; }
.mtr-score-l { color: var(--red); font-weight: 700; }
.mtr-score-d { color: var(--text-light); font-weight: 600; }
.mtr-result { font-size: 11px; font-weight: 600; min-width: 22px; text-align: center; }

/* Responsive */
@media(max-width:768px){
  .today-grid { grid-template-columns: 1fr; }
  .groups-grid { grid-template-columns: 1fr; }
  .bracket-wrapper { flex-direction: column; gap: 12px; }
  .bracket-half-columns { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0; }
  .bracket-center { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 12px; padding: 12px 0; }
  .bracket-final-card, .bracket-third-card { width: auto; flex: 1; min-width: 160px; }
}

.loading { text-align: center; padding: 60px 20px; color: var(--text-light); }
.loading-spinner { display: inline-block; width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div class="header">
  <h1>🏆 2026 美加墨世界杯</h1>
  <div class="header-sub">FIFA World Cup 2026 — 实时战报</div>
  <div class="header-right" id="updateTime">加载中...</div>
</div>

<div class="tabs" id="tabBar"></div>

<div class="container">
  <!-- Loading -->
  <div id="loadingEl" class="loading"><div class="loading-spinner"></div><p style="margin-top:12px;font-size:14px">正在加载数据...</p></div>

  <!-- Today -->
  <div id="view-today" class="view-section"><h2 style="margin-bottom:14px;font-size:17px">🔥 今日焦点</h2><div id="todayContent" class="today-grid"></div></div>

  <!-- Standings -->
  <div id="view-standings" class="view-section"><h2 style="margin-bottom:14px;font-size:17px">📊 小组积分榜</h2><div id="groupsContent" class="groups-grid"></div></div>

  <!-- Matches -->
  <div id="view-matches" class="view-section"><h2 style="margin-bottom:14px;font-size:17px">📅 全部赛程</h2><div id="timelineWrap" class="timeline-wrap"></div><div id="matchesContent"></div></div>

  <!-- Bracket -->
  <div id="view-bracket" class="view-section"><div id="bracketContent" class="bracket-container"><div class="bracket-title">🏆 淘汰赛对阵图</div><div id="bracketTree" class="bracket-tree"></div></div></div>
</div>

<!-- Team Modal -->
<div class="modal-overlay" id="teamModal">
  <div class="modal-box">
    <div class="modal-head"><h2 id="modalTitle"></h2><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-stats" id="modalStats"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
let wcData = null;
const STAGE_SHORT = {'group_stage':'小组赛','round_of_32':'32强','round_of_16':'16强','quarter_final':'8强','semi_final':'半决赛','final':'决赛'};
const STAGE_NAMES = {'group_stage':'小组赛','round_of_32':'32强淘汰赛','round_of_16':'16强','quarter_final':'四分之一决赛','semi_final':'半决赛','final':'决赛'};

function cn(team) { return team; } // data already has CN fields
function cnVenue(venue,city) { return cnStadium(venue) || city || venue || ''; }
function cnStadium(s) { return STADIUM_CN[s] || s; }
const STADIUM_CN = {
  'AT&T Stadium':'AT&T体育场(阿灵顿)','Atlanta Stadium':'亚特兰大体育场','BC Place':'BC Place体育场(温哥华)','BC Place Vancouver':'BC Place体育场(温哥华)','Boston Stadium':'波士顿体育场',
  'Dallas Stadium':'达拉斯体育场','Guadalajara Stadium':'瓜达拉哈拉体育场','Guadalupe Stadium':'瓜达卢佩体育场','Houston Stadium':'休斯顿体育场','Kansas City Stadium':'堪萨斯城体育场',
  'Los Angeles Stadium':'洛杉矶体育场','Miami Stadium':'迈阿密体育场','Mexico City Stadium':'墨西哥城体育场','Monterrey Stadium':'蒙特雷体育场',
  'New York/New Jersey Stadium':'纽约/新泽西体育场','Philadelphia Stadium':'费城体育场','San Francisco Bay Area Stadium':'圣克拉拉体育场','Santa Clara Stadium':'圣克拉拉体育场','Seattle Stadium':'西雅图体育场','Toronto Stadium':'多伦多体育场'
};

// ============ Data Load ============
async function loadData() {
  try {
    const resp = await fetch('data/worldcup-live.json?t=' + Date.now());
    wcData = await resp.json();
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('updateTime').textContent = '更新于 ' + new Date(wcData.generatedAt).toLocaleString('zh-CN');
    renderTabs();
    switchTab(currentTab || 'today');
  } catch(e) { document.getElementById('loadingEl').innerHTML = '<p style="color:red">数据加载失败，请检查服务器是否启动</p>'; }
}

// ============ Tabs ============
let currentTab = 'today';
const TABS = [
  {id:'today', icon:'🔥', label:'今日焦点'},
  {id:'standings', icon:'📊', label:'积分榜'},
  {id:'matches', icon:'📅', label:'全部赛程'},
  {id:'bracket', icon:'🏆', label:'淘汰赛'},
];
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = TABS.map(t => `<button class="tab-btn${t.id===currentTab?' active':''}" onclick="switchTab('${t.id}')">${t.icon} ${t.label}</button>`).join('');
}
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event && event.target && event.target.classList.add('active');
  // Also update tab button visual
  document.querySelectorAll('.tab-btn').forEach((b,i) => { if(TABS[i].id===tab) b.classList.add('active'); });
  document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + tab);
  if(el) el.classList.add('active');
  if(tab === 'today') renderToday();
  if(tab === 'standings') renderStandings();
  if(tab === 'matches') renderMatches();
  if(tab === 'bracket') renderBracket();
}

// ============ TODAY ============
function renderToday() {
  if(!wcData) return;
  let html = '';
  // Recent results
  html += '<div class="today-block"><h3 style="color:var(--green)">✅ 近期完赛</h3><div class="recent-list">';
  html += '<table class="recent-table"><thead><tr><th>日期</th><th>主队</th><th style="text-align:center;width:52px">比分</th><th>客队</th><th class="ta-r">场馆</th></tr></thead><tbody>';
  const recent = Object.values(wcData.playedByDate||{}).flat().slice(-10);
  recent.forEach(m => {
    html += `<tr>`;
    html += `<td class="recent-info">${m.date.slice(5)}</td>`;
    html += `<td><span class="recent-team" onclick="showTeamModal('${m.home}')">${m.homeCN||m.home}</span></td>`;
    html += `<td><span class="recent-score">${m.homeScore}-${m.awayScore}</span></td>`;
    html += `<td><span class="recent-team" onclick="showTeamModal('${m.away}')">${m.awayCN||m.away}</span></td>`;
    html += `<td class="recent-info" style="text-align:right">${cnVenue(m.stadium,m.city)||''}</td></tr>`;
  });
  html += '</tbody></table></div></div>';
  // Today upcoming
  html += '<div class="today-block"><h3 style="color:var(--gold)">🔜 即将开赛</h3>';
  html += '<table class="recent-table"><thead><tr><th>时间</th><th>主队</th><th style="text-align:center;width:32px">vs</th><th>客队</th><th class="ta-r">场馆</th></tr></thead><tbody>';
  const todayUp = wcData.todayUpcoming || [];
  if(todayUp.length === 0) {
    const nextUp = Object.values(wcData.upcomingByDate||{}).flat().slice(0,8);
    nextUp.forEach(m => {
      html += `<tr>`;
      html += `<td class="upcoming-time">${m.kickoffBJ || '待定'}</td>`;
      html += `<td><span class="recent-team" onclick="showTeamModal('${m.home}')">${m.homeCN||m.home}</span></td>`;
      html += `<td class="upcoming-vs" style="text-align:center;width:32px;font-size:11px;color:var(--text-light)">vs</td>`;
      html += `<td><span class="recent-team" onclick="showTeamModal('${m.away}')">${m.awayCN||m.away}</span></td>`;
      html += `<td class="upcoming-venue" style="text-align:right">${cnVenue(m.stadium,m.city)||''}</td></tr>`;
    });
  } else {
    todayUp.forEach(m => {
      html += `<tr>`;
      html += `<td class="upcoming-time">${m.kickoffBJ || '待定'}</td>`;
      html += `<td><span class="recent-team" onclick="showTeamModal('${m.home}')">${m.homeCN||m.home}</span></td>`;
      html += `<td class="upcoming-vs" style="text-align:center;width:32px;font-size:11px;color:var(--text-light)">vs</td>`;
      html += `<td><span class="recent-team" onclick="showTeamModal('${m.away}')">${m.awayCN||m.away}</span></td>`;
      html += `<td class="upcoming-venue" style="text-align:right">${cnVenue(m.stadium,m.city)||''}</td></tr>`;
    });
  }
  html += '</tbody></table></div>';
  document.getElementById('todayContent').innerHTML = html;
}

// ============ STANDINGS ============
function renderStandings() {
  if(!wcData) return;
  let html = '';
  for(const [gname, teams] of Object.entries(wcData.groups)) {
    html += `<div class="group-card"><div class="group-header">${gname} 组 · 小组赛</div><table class="group-table">`;
    html += `<thead><tr><th>#</th><th>球队</th><th>赛</th><th>胜/平/负</th><th>进/失</th><th>净胜</th><th>积分</th></tr></thead><tbody>`;
    teams.sort((a,b) => (a.position||99)-(b.position||99));
    teams.forEach(t => {
      const pos = t.position || 0;
      let posCls = pos<=2 ? `pos-${pos}` : (pos===3?'pos-3':'pos-other');
      const gdStr = t.gd > 0 ? '+'+t.gd : t.gd;
      const advIcon = t.advanced ? '<span class="advanced-check">✓</span>' : '';
      html += `<tr>`;
      html += `<td><span class="pos-badge ${posCls}">${pos}</span></td>`;
      html += `<td><span class="team-name-cell" onclick="showTeamModal('${t.team}')">${t.teamCN||t.team}</span> ${advIcon}</td>`;
      html += `<td>${t.played}</td>`;
      html += `<td>${t.won}/${t.drawn}/${t.lost}</td>`;
      html += `<td>${t.gf}/${t.ga}</td>`;
      html += `<td>${gdStr}</td>`;
      html += `<td><span class="pts-bold">${t.pts}</span></td>`;
      html += `</tr>`;
    });
    html += `</tbody></table></div>`;
  }
  document.getElementById('groupsContent').innerHTML = html;
}

// ============ MATCHES + TIMELINE ============
let currentTimelineDate = null;

function renderMatches(dateOverride) {
  if(!wcData) return;
  if(dateOverride !== undefined) currentTimelineDate = dateOverride;
  const c = document.getElementById('timelineWrap');
  const mContainer = document.getElementById('matchesContent');

  // Build sorted date list
  const allDates = new Set([...Object.keys(wcData.playedByDate||{}), ...Object.keys(wcData.upcomingByDate||{})]);
  const sortedDates = Array.from(allDates).sort();

  // Timeline
  let tlHtml = '<div class="timeline-inner">';
  tlHtml += `<div class="tl-day${!currentTimelineDate?' active':''}" onclick="renderMatches(null)">全部</div>`;
  const todayStr = new Date().toISOString().slice(0,10);
  for(const d of sortedDates) {
    const totalP = (wcData.playedByDate[d]||[]).length;
    const totalU = (wcData.upcomingByDate[d]||[]).length;
    const total = totalP + totalU;
    const isToday = d === todayStr;
    let cls = 'tl-day';
    if(d === currentTimelineDate) cls += ' active';
    if(totalP > 0) cls += ' has-played';
    if(totalU > 0) cls += ' has-upcoming';
    const star = isToday ? ' ★' : '';
    tlHtml += `<div class="${cls}" onclick="renderMatches('${d}')">${d.slice(5)}${star}<span class="tl-count">${total}</span></div>`;
  }
  tlHtml += '</div>';
  c.innerHTML = tlHtml;

  // Matches
  const datesToShow = currentTimelineDate ? [currentTimelineDate] : sortedDates;
  let html = '';
  for(const d of datesToShow) {
    const dayPlayed = wcData.playedByDate[d] || [];
    const dayUpcoming = wcData.upcomingByDate[d] || [];
    if(dayPlayed.length + dayUpcoming.length === 0) continue;

    const isToday = d === todayStr;
    html += `<h3 style="font-size:15px;margin:18px 0 10px;color:${isToday?'var(--red)': 'var(--text)'};">${d}${isToday ? ' (今天)' : ''}</h3>`;

    for(const m of dayPlayed) {
      html += `<div class="match-card played"><div class="match-teams">`;
      html += `<span class="match-team" onclick="showTeamModal('${m.home}')">${m.homeCN||m.home}</span>`;
      html += `<span class="match-score played-score">${m.homeScore}-${m.awayScore}</span>`;
      html += `<span class="match-team" onclick="showTeamModal('${m.away}')">${m.awayCN||m.away}</span>`;
      html += `</div><div class="match-detail">`;
      html += `<div class="md-time">✅ 完赛</div>`;
      html += `<div class="md-venue">${STAGE_SHORT[m.stage]||''} · 📍 ${cnVenue(m.stadium,m.city)}</div></div></div>`;
    }
    for(const m of dayUpcoming) {
      html += `<div class="match-card upcoming"><div class="match-teams">`;
      html += `<span class="match-team" onclick="showTeamModal('${m.home}')">${m.homeCN||m.home}</span>`;
      html += `<span style="color:var(--text-light);font-weight:400"> vs </span>`;
      html += `<span class="match-team" onclick="showTeamModal('${m.away}')">${m.awayCN||m.away}</span>`;
      html += `</div><div class="match-detail">`;
      html += `<div class="md-time">⏰ ${m.kickoffBJ || '待定'}</div>`;
      html += `<div class="md-venue">${STAGE_SHORT[m.stage]||''} · 📍 ${cnVenue(m.stadium,m.city)}</div></div></div>`;
    }
  }
  mContainer.innerHTML = html || '<p style="color:var(--text-light);padding:20px;text-align:center">该日期暂无比赛</p>';
}

// ============ BRACKET — Classic World Cup Tree ============
const BR_ROUNDS = [
  {key:'round_of_32', label:'32强', col:0},
  {key:'round_of_16', label:'16强', col:1},
  {key:'quarter_final', label:'8强', col:2},
  {key:'semi_final', label:'半决赛', col:3}
];

function renderBracket() {
  if(!wcData) return;
  const bracket = wcData.bracket;
  const tree = document.getElementById('bracketTree');

  // Split R32 into upper (first 8) and lower (last 8) halves
  const r32 = bracket.round_of_32 || [];
  const upperR32 = r32.slice(0, 8);
  const lowerR32 = r32.slice(8, 16);

  // Other rounds
  const r16 = bracket.round_of_16 || [];
  const qf = bracket.quarter_final || [];
  const sf = bracket.semi_final || [];
  const finals = bracket.final || [];
  const thirdPlace = bracket.third_place || [];

  // Upper half rounds
  const upperR16 = r16.slice(0, 4);
  const upperQF = qf.slice(0, 2);
  const upperSF = sf.slice(0, 1);

  // Lower half rounds
  const lowerSF = sf.slice(1, 2);
  const lowerQF = qf.slice(2, 4);
  const lowerR16 = r16.slice(4, 8);

  let html = '<div class="bracket-wrapper">';

  // ---- UPPER HALF (LEFT) ----
  html += '<div class="bracket-half upper">';
  html += '<div class="bracket-half-label">上半区</div>';
  html += '<div class="bracket-half-columns">';

  // R32
  html += buildRoundCol('32强', upperR32);
  html += buildConnector();
  // R16
  html += buildRoundCol('16强', upperR16);
  html += buildConnector();
  // QF
  html += buildRoundCol('8强', upperQF);
  html += buildConnector();
  // SF
  html += buildRoundCol('半决赛', upperSF);

  html += '</div></div>';

  // ---- CENTER: Final + Third Place ----
  html += '<div class="bracket-center">';

  // Final
  if(finals.length > 0) {
    const f = finals[0];
    html += '<div class="bracket-final-card">';
    html += '<div class="bracket-trophy-icon">🏆</div>';
    html += '<div class="bracket-final-label">决赛</div>';
    html += `<div class="mm-teams">${buildTeamRowsFinal(f)}</div>`;
    if(f.kickoffBJ) html += `<div class="mm-time">${f.kickoffBJ}</div>`;
    if(f.stadium) html += `<div class="mm-venue">${cnVenue(f.stadium, f.city)}</div>`;
    html += '</div>';
  }

  // Third place
  if(thirdPlace.length > 0) {
    const t = thirdPlace[0];
    html += '<div class="bracket-third-card">';
    html += '<div class="bracket-third-label">🥉 季军赛</div>';
    html += `<div class="mm-teams">${buildTeamRowsMini(t)}</div>`;
    if(t.kickoffBJ) html += `<div class="mm-time">${t.kickoffBJ}</div>`;
    if(t.stadium) html += `<div class="mm-venue">${cnVenue(t.stadium, t.city)}</div>`;
    html += '</div>';
  }

  html += '</div>';

  // ---- LOWER HALF (RIGHT) ----
  html += '<div class="bracket-half lower">';
  html += '<div class="bracket-half-label">下半区</div>';
  html += '<div class="bracket-half-columns">';

  // SF
  html += buildRoundCol('半决赛', lowerSF);
  html += buildConnector();
  // QF
  html += buildRoundCol('8强', lowerQF);
  html += buildConnector();
  // R16
  html += buildRoundCol('16强', lowerR16);
  html += buildConnector();
  // R32
  html += buildRoundCol('32强', lowerR32);

  html += '</div></div>';

  html += '</div>'; // bracket-wrapper

  tree.innerHTML = html;
}

function buildRoundCol(label, games) {
  let h = '<div class="bracket-round-col">';
  h += `<div class="bracket-round-header">${label}</div>`;
  h += '<div class="bracket-round-matches">';
  games.forEach(g => {
    h += '<div class="match-slot"><div class="match-mini-card">';
    h += `<div class="mm-teams">${buildTeamRowsMini(g)}</div>`;
    if(g.kickoffBJ) h += `<div class="mm-time">${g.kickoffBJ}</div>`;
    if(g.stadium) h += `<div class="mm-venue">${cnVenue(g.stadium, g.city)}</div>`;
    h += '</div></div>';
  });
  h += '</div></div>';
  return h;
}

function buildConnector() {
  return '<div class="bracket-connector-col"></div>';
}

function safeName(n) { return (n && n !== 'None' && n !== 'null') ? n : null; }

function buildTeamRowsMini(g) {
  const home = safeName(g.homeCN) || safeName(g.home);
  const away = safeName(g.awayCN) || safeName(g.away);
  const homeScore = g.homeScore;
  const awayScore = g.awayScore;
  const hasResult = homeScore !== null && homeScore !== undefined;
  const homeWinner = hasResult && g.winner === g.home;
  const awayWinner = hasResult && g.winner === g.away;

  let h = '';
  // Home team
  h += '<div class="mm-team-row">';
  h += homeWinner ? '<span class="mm-num">▲</span>' : '<span class="mm-num empty"></span>';
  h += `<span class="mm-team-name${homeWinner?' winner':''}" ${home?`onclick="showTeamModal('${g.home}')"`:'style="color:var(--text-light);cursor:default"'}>${home||'待定'}</span>`;
  h += `<span class="mm-score${hasResult?' played':' dash'}">${hasResult?homeScore:'-'}</span>`;
  h += '</div>';

  // Away team
  h += '<div class="mm-team-row">';
  h += awayWinner ? '<span class="mm-num">▲</span>' : '<span class="mm-num empty"></span>';
  h += `<span class="mm-team-name${awayWinner?' winner':''}" ${away?`onclick="showTeamModal('${g.away}')"`:'style="color:var(--text-light);cursor:default"'}>${away||'待定'}</span>`;
  h += `<span class="mm-score${hasResult?' played':' dash'}">${hasResult?awayScore:'-'}</span>`;
  h += '</div>';

  return h;
}

function buildTeamRowsFinal(g) {
  const home = safeName(g.homeCN) || safeName(g.home);
  const away = safeName(g.awayCN) || safeName(g.away);
  const homeScore = g.homeScore;
  const awayScore = g.awayScore;
  const hasResult = homeScore !== null && homeScore !== undefined;
  const homeWinner = hasResult && g.winner === g.home;
  const awayWinner = hasResult && g.winner === g.away;

  let h = '';
  // Home
  h += '<div class="mm-team-row">';
  h += homeWinner ? '<span class="mm-num">▲</span>' : '<span class="mm-num empty"></span>';
  h += `<span class="mm-team-name${homeWinner?' winner':''}" ${home?`onclick="showTeamModal('${g.home}')"`:'style="color:var(--text-light);cursor:default"'}>${home||'待定'}</span>`;
  h += `<span class="mm-score${hasResult?' played':' dash'}">${hasResult?homeScore:'-'}</span>`;
  h += '</div>';

  // Away
  h += '<div class="mm-team-row">';
  h += awayWinner ? '<span class="mm-num">▲</span>' : '<span class="mm-num empty"></span>';
  h += `<span class="mm-team-name${awayWinner?' winner':''}" ${away?`onclick="showTeamModal('${g.away}')"`:'style="color:var(--text-light);cursor:default"'}>${away||'待定'}</span>`;
  h += `<span class="mm-score${hasResult?' played':' dash'}">${hasResult?awayScore:'-'}</span>`;
  h += '</div>';

  return h;
}

// ============ TEAM MODAL ============
function showTeamModal(teamEn) {
  if(!wcData || !teamEn) return;
  const records = wcData.teamMatches?.[teamEn] || [];
  if(records.length === 0) return;
  const teamCN = records[0].homeCN || teamEn;

  // Find group ranking
  let groupInfo = '';
  const groups = wcData.groups || {};
  for(const [gName, teams] of Object.entries(groups)) {
    for(const t of teams) {
      if(t.team === teamEn) {
        groupInfo = `${gName}组 · 第${t.position}名`;
        if(t.advanced) groupInfo += ' ✅ 已晋级';
        break;
      }
    }
    if(groupInfo) break;
  }

  // Calc stats
  let wins=0, draws=0, losses=0, gf=0, ga=0;
  records.forEach(m => {
    const isHome = m.home === teamEn;
    const myScore = isHome ? m.homeScore : m.awayScore;
    const oppScore = isHome ? m.awayScore : m.homeScore;
    if(myScore === null || myScore === undefined) return;
    gf += myScore; ga += oppScore;
    if(myScore > oppScore) wins++;
    else if(myScore < oppScore) losses++;
    else draws++;
  });

  document.getElementById('modalTitle').textContent = teamCN + ' — 全部场次';
  document.getElementById('modalStats').innerHTML =
    `<div class="ms-item"><div class="ms-val">${records.length}</div><div class="ms-lbl">总场次</div></div>` +
    `<div class="ms-item"><div class="ms-val">${wins+draws+losses}</div><div class="ms-lbl">已赛</div></div>` +
    `<div class="ms-item"><div class="ms-val">${wins*3+draws}</div><div class="ms-lbl">积分</div></div>` +
    `<div class="ms-item"><div class="ms-val">${gf-ga>=0?'+':''}${gf-ga}</div><div class="ms-lbl">净胜球</div></div>` +
    `<div class="ms-item"><div class="ms-val">${gf}/${ga}</div><div class="ms-lbl">进/失</div></div>` +
    `<div class="ms-item"><div class="ms-val" style="color:var(--green)">${wins}</div><div class="ms-lbl">胜</div></div>` +
    `<div class="ms-item"><div class="ms-val" style="color:#b0b0b0">${draws}</div><div class="ms-lbl">平</div></div>` +
    `<div class="ms-item"><div class="ms-val" style="color:var(--red)">${losses}</div><div class="ms-lbl">负</div></div>` +
    (groupInfo ? `<div class="ms-item ms-group-rank"><div class="ms-val">${groupInfo}</div></div>` : '');

  let bodyHtml = '';
  records.forEach(m => {
    const isHome = m.home === teamEn;
    const opponent = isHome ? m.away : m.home;
    const oppCN = isHome ? (m.awayCN||m.away) : (m.homeCN||m.home);
    const myScore = isHome ? m.homeScore : m.awayScore;
    const oppScore = isHome ? m.awayScore : m.homeScore;
    const hasResult = myScore !== null && myScore !== undefined;
    let scoreCls = '', resultStr = '';
    if(hasResult) {
      if(myScore > oppScore) { scoreCls='mtr-score-w'; resultStr='胜'; }
      else if(myScore < oppScore) { scoreCls='mtr-score-l'; resultStr='负'; }
      else { scoreCls='mtr-score-d'; resultStr='平'; }
    }
    bodyHtml += `<div class="mtr-record">`;
    bodyHtml += `<div class="mtr-date">${m.date}${m.kickoffBJ? ' '+m.kickoffBJ:''}</div>`;
    bodyHtml += `<div class="mtr-stage">${STAGE_SHORT[m.stage]||''}</div>`;
    bodyHtml += `<div class="mtr-ha">${isHome?'主':'客'}</div>`;
    bodyHtml += `<span class="mtr-opponent" onclick="showTeamModal('${opponent}')">${oppCN}</span>`;
    if(hasResult) bodyHtml += `<span class="mtr-score ${scoreCls}">${myScore}-${oppScore}</span>`;
    else bodyHtml += `<span class="mtr-score" style="color:var(--text-light)">vs</span>`;
    if(hasResult) bodyHtml += `<span class="mtr-result ${scoreCls}">${resultStr}</span>`;
    bodyHtml += `</div>`;
  });

  document.getElementById('modalBody').innerHTML = bodyHtml || '<p style="color:var(--text-light);text-align:center;padding:20px">暂无比赛记录</p>';
  document.getElementById('teamModal').classList.add('show');
}

function showTeamModalByName(name) {
  // Find team English name by Chinese
  if(!wcData || !name || name === '待定') return;
  for(const en of Object.keys(wcData.teamMatches||{})) {
    const recs = wcData.teamMatches[en];
    if(recs && recs[0] && ((recs[0].homeCN||recs[0].home) === name)) {
      showTeamModal(en);
      return;
    }
  }
  // Fallback: search groups
  for(const [,teams] of Object.entries(wcData.groups)) {
    for(const t of teams) { if(t.teamCN === name || t.team === name) { showTeamModal(t.team); return; } }
  }
}

function closeModal() {
  document.getElementById('teamModal').classList.remove('show');
}

document.getElementById('teamModal').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

// ============ Init ============
loadData();
setInterval(loadData, 60000);
